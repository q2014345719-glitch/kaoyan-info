<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>考研情报站</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="container">


<div class="top">

<h1>🎓 考研情报站</h1>

<p class="author">
作者：漆有此理
</p>


<p>
本地数据库版
</p>


</div>



<form class="search-box" action="/search" method="post">


<input
type="text"
id="school"
name="school"
placeholder="请输入目标院校名称"
autocomplete="off"
required>


<div id="suggestions"></div>


<button type="submit">
查询情报
</button>


</form>





<div class="card">


<h2>🏫 学校概况</h2>



{% if school %}


<p>
<strong>学校：</strong>

{{ school.name }}

</p>


<p>
<strong>城市：</strong>

{{ school.city }}

</p>



<p>
<strong>学校类型：</strong>

{{ school.school_type }}

</p>



<p>
<strong>学校官网：</strong>

<a href="{{ school.website }}" target="_blank">

{{ school.website }}

</a>

</p>



{% else %}


<p>
请输入学校名称进行查询。
</p>


{% endif %}



</div>





<div class="card">


<h2>📚 后续功能</h2>


<p>
✅ 招生专业数据库
</p>

<p>
✅ 历年分数线
</p>

<p>
✅ 招生简章自动更新
</p>

<p>
✅ AI考研分析
</p>


</div>




<div class="card">

<h2>📌 数据说明</h2>


<p>
当前版本：
SQLite数据库版
</p>


<p>
数据来源：
高校官网公开信息
</p>


</div>




<script src="{{ url_for('static', filename='script.js') }}"></script>


</body>


</html>
